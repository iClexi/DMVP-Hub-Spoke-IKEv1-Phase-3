! Configuracion base sugerida para switches L2 del laboratorio
! Aplica el hostname correspondiente en cada switch.

enable
configure terminal
no ip domain-lookup
spanning-tree mode pvst

! En este lab los switches funcionan como capa 2 para conectar PCs con routers.
! Los puertos pueden quedar en modo access por defecto si no se usan VLANs.

end
write memory
