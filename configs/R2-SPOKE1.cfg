! ============================================================
! R2-SPOKE1 - DMVPN Fase 3 Spoke con IKEv2 + EIGRP
! Nombre: Michael Robles | Matricula: 20250845
! ============================================================
enable
configure terminal
hostname R2-SPOKE1
no ip domain-lookup
ip cef

interface GigabitEthernet0/0
 description WAN hacia ISP
 ip address 20.25.8.6 255.255.255.252
 no shutdown

interface GigabitEthernet0/1
 description LAN SPOKE1 hacia SW-SPOKE-1
 ip address 192.168.84.1 255.255.255.0
 no shutdown

ip route 0.0.0.0 0.0.0.0 20.25.8.5

crypto ikev2 proposal IKEV2-DMVPN-PROP
 encryption aes-cbc-256
 integrity sha256
 group 14

crypto ikev2 policy IKEV2-DMVPN-POLICY
 proposal IKEV2-DMVPN-PROP

crypto ikev2 keyring IKEV2-DMVPN-KEYRING
 peer DMVPN-PEERS
  address 0.0.0.0 0.0.0.0
  pre-shared-key local ITLA20250845
  pre-shared-key remote ITLA20250845

crypto ikev2 profile IKEV2-DMVPN-PROFILE
 match identity remote address 0.0.0.0
 authentication remote pre-share
 authentication local pre-share
 keyring local IKEV2-DMVPN-KEYRING

crypto ipsec transform-set DMVPN-TRANSFORM esp-aes 256 esp-sha256-hmac
 mode transport

crypto ipsec profile DMVPN-IPSEC-PROFILE
 set transform-set DMVPN-TRANSFORM
 set ikev2-profile IKEV2-DMVPN-PROFILE

interface Tunnel0
 description DMVPN FASE 3 SPOKE1 IKEV2
 ip address 172.16.45.2 255.255.255.0
 no ip redirects
 ip mtu 1400
 ip tcp adjust-mss 1360
 ip nhrp authentication DMVPN45
 ip nhrp network-id 45
 ip nhrp holdtime 300
 ip nhrp map 172.16.45.1 20.25.8.2
 ip nhrp map multicast 20.25.8.2
 ip nhrp nhs 172.16.45.1
 ip nhrp shortcut
 tunnel source GigabitEthernet0/0
 tunnel mode gre multipoint
 tunnel key 45
 tunnel protection ipsec profile DMVPN-IPSEC-PROFILE

router eigrp 45
 no auto-summary
 passive-interface default
 no passive-interface Tunnel0
 network 172.16.45.0 0.0.0.255
 network 192.168.84.0 0.0.0.255

end
write memory
